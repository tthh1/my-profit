<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- 开启 iOS 独立的 PWA (全屏 App) 模式配置 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="月底计算利润">
  
  <title>月底利润核算 App</title>
  
  <!-- 引入 Tailwind CSS 构建现代、极简、精美的苹果质感 UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 FontAwesome 字体图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- 引入 html2canvas 核心脚本 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    /* 全局 iOS 适配与流畅弹性滚动 */
    body {
      background-color: #f6f8fa;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    
    /* 豪华渐变背景 */
    .premium-gradient {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #9333ea 100%);
    }

    /* 隐藏数字输入框默认的微调箭头，保持界面的整洁 */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    /* 纸张锯齿波浪纹（截图长图专用装饰） */
    .zigzag-border {
      position: relative;
    }
    .zigzag-border::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 6px;
      background-image: radial-gradient(circle, transparent, transparent 50%, #ffffff 50%, #ffffff 100%);
      background-size: 12px 12px;
    }

    /* 优雅高光微立体阴影 */
    .ios-shadow {
      box-shadow: 0 4px 20px -2px rgba(124, 58, 237, 0.05), 0 2px 6px -1px rgba(0, 0, 0, 0.02);
    }
    .ios-shadow-active {
      box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.12), 0 8px 16px -6px rgba(124, 58, 237, 0.06);
    }

    /* 财务公章水印 */
    .finance-stamp {
      border: 3px solid rgba(239, 68, 68, 0.25);
      color: rgba(239, 68, 68, 0.25);
      transform: rotate(-12deg);
      font-family: "Georgia", serif;
    }
  </style>
</head>
<body class="bg-[#f6f8fa] text-[#1e293b] min-h-screen flex flex-col pb-36">

  <!-- 原生精美 App 导航条 -->
  <header class="bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
    <div class="flex items-center space-x-2">
      <div class="w-9 h-9 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 shadow-inner">
        <i class="fa-solid fa-file-invoice-dollar text-base"></i>
      </div>
      <span class="font-extrabold text-base tracking-wide text-gray-800">门店月底利润核算</span>
    </div>
    <!-- 存储状态指示灯 -->
    <span class="bg-emerald-50 text-emerald-600 text-[11px] px-3 py-1 rounded-full font-bold border border-emerald-100 flex items-center space-x-1.5">
      <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
      <span>数据安全本地存</span>
    </span>
  </header>

  <div class="max-w-md mx-auto w-full px-4 pt-4 flex-grow space-y-4">
    
    <!-- 顶端 Tab 切换栏 -->
    <div class="flex bg-white rounded-2xl p-1.5 shadow-sm border border-gray-100">
      <button id="tab-input" onclick="switchPage('input')" class="flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center space-x-2 bg-[#2d3a4f] text-white ios-shadow">
        <i class="fa-solid fa-pen-to-square text-xs"></i>
        <span>账单输入</span>
      </button>
      <button id="tab-history" onclick="switchPage('history')" class="flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center space-x-2 text-gray-500 bg-white">
        <i class="fa-solid fa-clock-rotate-left text-xs"></i>
        <span>历史统计</span>
      </button>
    </div>

    <!-- ==================== 模块1: 账单输入页 ==================== -->
    <div id="section-input" class="space-y-4">
      
      <!-- 账单月份选择卡片 (高级渐变，重构为完全活化的高清双选择器) -->
      <div class="premium-gradient text-white rounded-3xl p-6 shadow-lg relative overflow-hidden">
        <!-- 氛围装饰圈 -->
        <div class="absolute -right-12 -bottom-12 w-36 h-36 bg-white opacity-10 rounded-full"></div>
        <div class="absolute -left-6 -top-6 w-24 h-24 bg-white opacity-5 rounded-full"></div>
        
        <div class="flex items-center space-x-2 mb-4">
          <div class="w-7 h-7 rounded-lg bg-white/10 flex items-center justify-center">
            <i class="fa-regular fa-calendar-check text-base"></i>
          </div>
          <span class="text-sm font-bold tracking-wide opacity-95">账单月份选择</span>
        </div>
        
        <div class="flex justify-between items-center mt-3">
          <div class="flex items-center space-x-1 opacity-90">
            <i class="fa-regular fa-calendar text-xs"></i>
            <span class="text-xs">选择年份与月份</span>
          </div>
          
          <div class="flex space-x-2 z-10">
            <!-- 年份选择 -->
            <div class="relative bg-white text-gray-800 rounded-xl px-3 py-2 shadow-sm font-bold text-xs flex items-center">
              <select id="select-year" onchange="onDateSelectorChange()" class="appearance-none bg-transparent pr-6 font-bold outline-none cursor-pointer">
                <option value="2025">2025年</option>
                <option value="2026" selected>2026年</option>
                <option value="2027">2027年</option>
              </select>
              <i class="fa-solid fa-chevron-down absolute right-2 text-gray-400 pointer-events-none text-[9px]"></i>
            </div>
            <!-- 月份选择 -->
            <div class="relative bg-white text-gray-800 rounded-xl px-3 py-2 shadow-sm font-bold text-xs flex items-center">
              <select id="select-month" onchange="onDateSelectorChange()" class="appearance-none bg-transparent pr-6 font-bold outline-none cursor-pointer">
                <option value="01">1月</option>
                <option value="02">2月</option>
                <option value="03">3月</option>
                <option value="04">4月</option>
                <option value="05">5月</option>
                <option value="06" selected>6月</option>
                <option value="07">7月</option>
                <option value="08">8月</option>
                <option value="09">9月</option>
                <option value="10">10月</option>
                <option value="11">11月</option>
                <option value="12">12月</option>
              </select>
              <i class="fa-solid fa-chevron-down absolute right-2 text-gray-400 pointer-events-none text-[9px]"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- 收入输入组 (绿色美化) -->
      <div class="bg-white rounded-3xl p-5 ios-shadow border border-gray-100/50">
        <div class="flex items-center space-x-2 pb-3 mb-4 border-b border-gray-100 text-emerald-500 font-bold text-base">
          <i class="fa-solid fa-circle-arrow-down text-lg"></i>
          <span>营业额收入</span>
        </div>
        
        <div class="space-y-4">
          <!-- 会生活 -->
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center transition-all group-focus-within:bg-emerald-500 group-focus-within:text-white shadow-sm">
                <i class="fa-solid fa-store text-sm"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">会生活</span>
            </div>
            <input type="number" id="val-huiseghuom" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>

          <!-- 饿了么 -->
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center transition-all group-focus-within:bg-emerald-500 group-focus-within:text-white shadow-sm">
                <i class="fa-solid fa-motorcycle text-sm"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">饿了么</span>
            </div>
            <input type="number" id="val-eleme" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>

          <!-- 美团 -->
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center transition-all group-focus-within:bg-emerald-500 group-focus-within:text-white shadow-sm">
                <i class="fa-solid fa-trash-can text-sm"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">美团</span>
            </div>
            <input type="number" id="val-meituan" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>

          <!-- 抖音收入 -->
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center transition-all group-focus-within:bg-[#ff0050] group-focus-within:text-white shadow-sm">
                <i class="fa-brands fa-tiktok text-sm"></i>
              </div>
              <span class="text-sm font-bold text-gray-700">抖音收入</span>
            </div>
            <input type="number" id="val-douyin" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>

          <!-- 现金收入 -->
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center transition-all group-focus-within:bg-emerald-500 group-focus-within:text-white shadow-sm">
                <i class="fa-regular fa-money-bill-1 text-sm"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">现金收入</span>
            </div>
            <input type="number" id="val-cash" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>
        </div>
      </div>

      <!-- 支出输入组 (红色美化，陈支出更新为陈工资) -->
      <div class="bg-white rounded-3xl p-5 ios-shadow border border-gray-100/50">
        <div class="flex items-center space-x-2 pb-3 mb-4 border-b border-gray-100 text-rose-500 font-bold text-base">
          <i class="fa-solid fa-circle-arrow-up text-lg"></i>
          <span>支出成本</span>
        </div>
        
        <div class="space-y-4">
          <!-- 支出货款/杂费 -->
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-rose-50 text-rose-500 flex items-center justify-center transition-all group-focus-within:bg-rose-500 group-focus-within:text-white shadow-sm">
                <i class="fa-regular fa-credit-card text-sm"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">支出货款/杂费</span>
            </div>
            <input type="number" id="val-goods" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>

          <!-- 陈工资 [全新命名] -->
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center transition-all group-focus-within:bg-indigo-600 group-focus-within:text-white shadow-sm">
                <i class="fa-solid fa-user-tie text-sm"></i>
              </div>
              <span class="text-sm font-bold text-indigo-700">陈工资</span>
            </div>
            <input type="number" id="val-chen-salary" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-indigo-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>

          <!-- 房租 -->
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-rose-50 text-rose-500 flex items-center justify-center transition-all group-focus-within:bg-rose-500 group-focus-within:text-white shadow-sm">
                <i class="fa-solid fa-house-chimney text-sm"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">房租</span>
            </div>
            <input type="number" id="val-rent" value="6666" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>

          <!-- 张工资 -->
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-rose-50 text-rose-500 flex items-center justify-center transition-all group-focus-within:bg-rose-500 group-focus-within:text-white shadow-sm">
                <i class="fa-solid fa-user text-sm"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">张工资</span>
            </div>
            <input type="number" id="val-zhang-salary" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>

          <!-- 阿姨工资 -->
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-rose-50 text-rose-500 flex items-center justify-center transition-all group-focus-within:bg-rose-500 group-focus-within:text-white shadow-sm">
                <i class="fa-solid fa-user-ninja text-sm"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">阿姨工资</span>
            </div>
            <input type="number" id="val-ayi-salary" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>

          <!-- 张加班工资 -->
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-rose-50 text-rose-500 flex items-center justify-center transition-all group-focus-within:bg-rose-500 group-focus-within:text-white shadow-sm">
                <i class="fa-regular fa-clock text-sm"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">张加班工资</span>
            </div>
            <input type="number" id="val-zhang-overtime" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>
        </div>
      </div>

      <!-- 库存变动组 -->
      <div class="bg-white rounded-3xl p-5 ios-shadow border border-gray-100/50">
        <div class="flex items-center space-x-2 pb-3 mb-4 border-b border-gray-100 text-blue-500 font-bold text-base">
          <i class="fa-solid fa-boxes-stacked text-lg"></i>
          <span>库存核算</span>
        </div>
        
        <div class="space-y-4">
          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center transition-all group-focus-within:bg-blue-500 group-focus-within:text-white shadow-sm">
                <i class="fa-solid fa-arrow-rotate-left text-sm"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">上月库存</span>
            </div>
            <input type="number" id="val-inv-last" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>

          <div class="flex justify-between items-center group">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center transition-all group-focus-within:bg-blue-500 group-focus-within:text-white shadow-sm">
                <i class="fa-solid fa-box text-sm"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">本月库存</span>
            </div>
            <input type="number" id="val-inv-this" placeholder="0.00" class="w-36 text-right bg-[#f8fafc] border border-gray-100 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded-xl py-2.5 px-4 text-gray-800 font-extrabold outline-none text-base transition-all" oninput="runLiveCalculation()">
          </div>
        </div>
      </div>

      <!-- 实时预览看板 (新公式完美支持) -->
      <div id="live-preview-box" class="bg-gradient-to-tr from-indigo-50 to-purple-50 rounded-3xl p-5 border border-indigo-100/70 space-y-3.5 shadow-inner hidden">
        <div class="text-[11px] font-black text-indigo-700 tracking-wider uppercase flex items-center space-x-1">
          <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full"></span>
          <span>实时财务看板（最新分润公式）</span>
        </div>
        <div class="grid grid-cols-3 gap-3 text-center">
          <div class="bg-white p-3 rounded-2xl border border-indigo-100/30 shadow-xs">
            <div class="text-[10px] text-gray-400 font-medium mb-1">门店纯利润</div>
            <div id="preview-shop" class="text-xs font-black text-gray-800">¥0.00</div>
          </div>
          <div class="bg-white p-3 rounded-2xl border border-indigo-100/30 shadow-xs">
            <div class="text-[10px] text-gray-400 font-medium mb-1">su分润(80%)</div>
            <div id="preview-su" class="text-xs font-black text-emerald-600">¥0.00</div>
          </div>
          <div class="bg-white p-3 rounded-2xl border border-indigo-100/30 shadow-xs">
            <div class="text-[10px] text-gray-400 font-medium mb-1">张总收益</div>
            <div id="preview-zhang" class="text-xs font-black text-indigo-600">¥0.00</div>
          </div>
        </div>
      </div>

    </div>

    <!-- ==================== 模块2: 历史统计页 ==================== -->
    <div id="section-history" class="hidden space-y-4">
      <div class="text-xs text-gray-400 px-1 flex justify-between items-center">
        <span>已存档月度经营报表</span>
        <button onclick="askClearAll()" class="text-rose-500 hover:text-rose-700 text-xs font-semibold flex items-center space-x-1 py-1.5 px-3 hover:bg-rose-50 rounded-2xl transition-all">
          <i class="fa-regular fa-trash-can"></i>
          <span>一键清空</span>
        </button>
      </div>

      <!-- 历史卡片滚动容器 (全新美化，带锯齿发票感、公章等截图元素) -->
      <div id="history-box" class="space-y-5">
        <!-- JS 动态渲染历史长图卡片 -->
      </div>
      
      <div id="history-empty" class="flex flex-col items-center justify-center py-24 text-gray-400 space-y-3">
        <i class="fa-solid fa-receipt text-5xl opacity-20"></i>
        <p class="text-sm font-medium">暂时没有历史账单记录</p>
      </div>
    </div>
  </div>

  <!-- iOS 底部固定的全局控制工具栏 -->
  <div id="dock-bar" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-gray-100/90 p-4 shadow-[0_-8px_30px_rgb(0,0,0,0.03)] flex items-center justify-between z-40">
    <div class="flex-grow pr-4">
      <div class="text-[10px] text-gray-400 font-bold tracking-wide uppercase">本月预计总利润</div>
      <div id="dock-total-money" class="text-2xl font-black text-gray-800 mt-0.5">¥ 0.00</div>
    </div>
    <button onclick="saveCurrentBill()" class="bg-[#2d3a4f] hover:bg-[#1f2937] active:scale-95 text-white px-7 py-3.5 rounded-2xl font-bold text-sm shadow-md flex items-center space-x-2 transition-all duration-150">
      <i class="fa-solid fa-calculator text-xs"></i>
      <span>保存并计算利润</span>
    </button>
  </div>

  <!-- 全局自定义 iOS 拟物对话弹窗 -->
  <div id="modal-dialog" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-6 hidden opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-3xl max-w-xs w-full p-6 text-center shadow-2xl space-y-4 transform scale-90 transition-transform duration-300">
      <div class="w-12 h-12 rounded-full bg-indigo-50 text-indigo-500 mx-auto flex items-center justify-center text-xl shadow-inner">
        <i class="fa-solid fa-circle-question"></i>
      </div>
      <h4 class="font-extrabold text-gray-800 text-base" id="dialog-title">系统提醒</h4>
      <p class="text-sm text-gray-500 leading-relaxed" id="dialog-msg">确认执行该操作吗？</p>
      <div class="flex space-x-3 pt-2">
        <button id="dialog-cancel" class="flex-1 py-3 bg-gray-100 active:bg-gray-200 text-gray-600 rounded-2xl font-bold text-sm transition hidden">取消</button>
        <button id="dialog-confirm" class="flex-1 py-3 bg-[#2d3a4f] active:bg-[#1e2837] text-white rounded-2xl font-bold text-sm transition">确定</button>
      </div>
    </div>
  </div>

  <!-- 顶部轻量浮动通知 -->
  <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 bg-black/85 text-white px-5 py-3 rounded-full text-xs font-semibold tracking-wide z-50 shadow-md flex items-center space-x-2 opacity-0 pointer-events-none transition-all duration-300">
    <i class="fa-solid fa-circle-check text-emerald-400"></i>
    <span id="toast-text">消息提示</span>
  </div>

  <script>
    // 数据库设定
    let appDatabase = {
      history: [
        {
          id: "record-2026-05",
          month: "2026-05",
          monthStr: "2026年05月",
          shopProfit: 840.77,
          suProfit: 672.62,   
          zhangTotal: 8194.48, 
          isExpanded: false,
          details: {
            income: { huiseghuom: 12000, eleme: 8400, meituan: 16500, douyin: 0, cash: 1200 },
            expense: { goods: 15413.23, chenSalary: 1000, rent: 6666, zhangSalary: 7500, ayiSalary: 3500, zhangOvertime: 526.33 },
            inventory: { lastMonth: 2000, thisMonth: 2000 }
          }
        },
        {
          id: "record-2026-04",
          month: "2026-04",
          monthStr: "2026年04月",
          shopProfit: -3878.71,
          suProfit: -3102.97,   
          zhangTotal: 8050.59, 
          isExpanded: false,
          details: {
            income: { huiseghuom: 9800, eleme: 6200, meituan: 11000, douyin: 0, cash: 500 },
            expense: { goods: 11186.38, chenSalary: 1200, rent: 6666, zhangSalary: 8000, ayiSalary: 3500, zhangOvertime: 826.33 },
            inventory: { lastMonth: 1500, thisMonth: 1500 }
          }
        }
      ]
    };

    // 本地存储升级与兼容性处理（陈支出 chenExp 升级为陈工资 chenSalary）
    const storageKey = 'my_profit_helper_v5_pic';
    const oldStorageKey = 'my_profit_helper_v4_pic';

    function initDatabase() {
      let loadedDb = null;
      if (localStorage.getItem(storageKey)) {
        loadedDb = JSON.parse(localStorage.getItem(storageKey));
      } else if (localStorage.getItem(oldStorageKey)) {
        // 如果有 v4 版本老数据，进行数据平滑迁移
        const oldDb = JSON.parse(localStorage.getItem(oldStorageKey));
        if (oldDb && oldDb.history) {
          oldDb.history.forEach(h => {
            if (h.details && h.details.expense) {
              if (h.details.expense.chenExp !== undefined && h.details.expense.chenSalary === undefined) {
                h.details.expense.chenSalary = h.details.expense.chenExp;
                delete h.details.expense.chenExp;
              }
            }
          });
        }
        loadedDb = oldDb;
      }

      if (loadedDb) {
        appDatabase = loadedDb;
      }
      localStorage.setItem(storageKey, JSON.stringify(appDatabase));
    }

    initDatabase();

    function triggerDialog(title, msg, showCancel = false, confirmCallback = null) {
      const modal = document.getElementById('modal-dialog');
      const container = modal.querySelector('div');
      
      document.getElementById('dialog-title').innerText = title;
      document.getElementById('dialog-msg').innerText = msg;
      
      const cancelBtn = document.getElementById('dialog-cancel');
      const confirmBtn = document.getElementById('dialog-confirm');
      
      if (showCancel) cancelBtn.classList.remove('hidden');
      else cancelBtn.classList.add('hidden');
      
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.add('opacity-100');
        container.classList.remove('scale-90');
      }, 50);

      confirmBtn.onclick = function() {
        closeModal();
        if (confirmCallback) confirmCallback();
      };
      cancelBtn.onclick = closeModal;
      
      function closeModal() {
        modal.classList.remove('opacity-100');
        container.classList.add('scale-90');
        setTimeout(() => { modal.classList.add('hidden'); }, 300);
      }
    }

    function triggerToast(text) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-text').innerText = text;
      toast.classList.remove('opacity-0', 'pointer-events-none');
      toast.classList.add('opacity-100', '-translate-y-1');
      setTimeout(() => {
        toast.classList.add('opacity-0', 'pointer-events-none');
        toast.classList.remove('opacity-100', '-translate-y-1');
      }, 2000);
    }

    function switchPage(page) {
      const tabInput = document.getElementById('tab-input');
      const tabHistory = document.getElementById('tab-history');
      const sectionInput = document.getElementById('section-input');
      const sectionHistory = document.getElementById('section-history');
      const dockBar = document.getElementById('dock-bar');

      if (page === 'input') {
        tabInput.className = "flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center space-x-2 bg-[#2d3a4f] text-white ios-shadow";
        tabHistory.className = "flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center space-x-2 text-gray-500 bg-white";
        sectionInput.classList.remove('hidden');
        sectionHistory.classList.add('hidden');
        dockBar.classList.remove('hidden');
      } else {
        tabInput.className = "flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center space-x-2 text-gray-500 bg-white";
        tabHistory.className = "flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center space-x-2 bg-[#2d3a4f] text-white ios-shadow";
        sectionInput.classList.add('hidden');
        sectionHistory.classList.remove('hidden');
        dockBar.classList.add('hidden');
        renderHistory();
      }
    }

    function onDateSelectorChange() {
      const year = document.getElementById('select-year').value;
      const month = document.getElementById('select-month').value;
      onMonthChange(`${year}-${month}`);
    }

    function onMonthChange(val) {
      const parts = val.split('-');
      document.getElementById('select-year').value = parts[0];
      document.getElementById('select-month').value = parts[1];

      const found = appDatabase.history.find(h => h.month === val);
      if (found) {
        document.getElementById('val-huiseghuom').value = found.details.income.huiseghuom || '';
        document.getElementById('val-eleme').value = found.details.income.eleme || '';
        document.getElementById('val-meituan').value = found.details.income.meituan || '';
        document.getElementById('val-douyin').value = found.details.income.douyin || '';
        document.getElementById('val-cash').value = found.details.income.cash || '';
        
        document.getElementById('val-goods').value = found.details.expense.goods || '';
        document.getElementById('val-chen-salary').value = found.details.expense.chenSalary || '';
        document.getElementById('val-rent').value = found.details.expense.rent || '';
        document.getElementById('val-zhang-salary').value = found.details.expense.zhangSalary || '';
        document.getElementById('val-ayi-salary').value = found.details.expense.ayiSalary || '';
        document.getElementById('val-zhang-overtime').value = found.details.expense.zhangOvertime || '';
        
        document.getElementById('val-inv-last').value = found.details.inventory.lastMonth || '';
        document.getElementById('val-inv-this').value = found.details.inventory.thisMonth || '';
      } else {
        document.getElementById('val-huiseghuom').value = '';
        document.getElementById('val-eleme').value = '';
        document.getElementById('val-meituan').value = '';
        document.getElementById('val-douyin').value = '';
        document.getElementById('val-cash').value = '';
        
        document.getElementById('val-goods').value = '';
        document.getElementById('val-chen-salary').value = '';
        document.getElementById('val-rent').value = '6666';
        document.getElementById('val-zhang-salary').value = '';
        document.getElementById('val-ayi-salary').value = '';
        document.getElementById('val-zhang-overtime').value = '';

        const previousMonthId = getPreviousMonthString(val);
        const previousRecord = appDatabase.history.find(h => h.month === previousMonthId);
        if (previousRecord) {
          document.getElementById('val-inv-last').value = previousRecord.details.inventory.thisMonth || '';
        } else {
          document.getElementById('val-inv-last').value = '';
        }
        document.getElementById('val-inv-this').value = '';
      }
      runLiveCalculation();
    }

    function getPreviousMonthString(currentMonth) {
      let [year, month] = currentMonth.split('-').map(Number);
      month--;
      if (month === 0) { month = 12; year--; }
      return `${year}-${month.toString().padStart(2, '0')}`;
    }

    function calculateData() {
      const huiseghuom = parseFloat(document.getElementById('val-huiseghuom').value) || 0;
      const eleme = parseFloat(document.getElementById('val-eleme').value) || 0;
      const meituan = parseFloat(document.getElementById('val-meituan').value) || 0;
      const douyin = parseFloat(document.getElementById('val-douyin').value) || 0;
      const cash = parseFloat(document.getElementById('val-cash').value) || 0;
      const totalIncome = huiseghuom + eleme + meituan + douyin + cash;

      const goods = parseFloat(document.getElementById('val-goods').value) || 0;
      const chenSalary = parseFloat(document.getElementById('val-chen-salary').value) || 0;
      const rent = parseFloat(document.getElementById('val-rent').value) || 0;
      const zhangSalary = parseFloat(document.getElementById('val-zhang-salary').value) || 0;
      const ayiSalary = parseFloat(document.getElementById('val-ayi-salary').value) || 0;
      const zhangOvertime = parseFloat(document.getElementById('val-zhang-overtime').value) || 0;
      const totalExpense = goods + chenSalary + rent + zhangSalary + ayiSalary + zhangOvertime;

      const lastMonthInventory = parseFloat(document.getElementById('val-inv-last').value) || 0;
      const thisMonthInventory = parseFloat(document.getElementById('val-inv-this').value) || 0;
      const inventoryDelta = thisMonthInventory - lastMonthInventory;

      const shopProfit = totalIncome - totalExpense + inventoryDelta;
      const baseProfit = totalIncome - totalExpense; 
      const suProfit = baseProfit * 0.8;
      const zhangProfitShare = baseProfit * 0.2;
      const zhangTotal = zhangProfitShare + zhangSalary + zhangOvertime;

      return {
        shopProfit, suProfit, zhangTotal,
        raw: {
          income: { huiseghuom, eleme, meituan, douyin, cash },
          expense: { goods, chenSalary, rent, zhangSalary, ayiSalary, zhangOvertime },
          inventory: { lastMonth: lastMonthInventory, thisMonth: thisMonthInventory }
        }
      };
    }

    function runLiveCalculation() {
      const res = calculateData();
      const hasContent = (
        document.getElementById('val-huiseghuom').value ||
        document.getElementById('val-eleme').value ||
        document.getElementById('val-meituan').value ||
        document.getElementById('val-douyin').value ||
        document.getElementById('val-goods').value ||
        document.getElementById('val-chen-salary').value
      );

      const previewBox = document.getElementById('live-preview-box');
      const dockTotalMoney = document.getElementById('dock-total-money');

      dockTotalMoney.innerText = `¥ ${res.shopProfit.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      dockTotalMoney.className = res.shopProfit >= 0 ? "text-2xl font-black text-emerald-600 animate-pulse" : "text-2xl font-black text-rose-500";

      if (hasContent) {
        previewBox.classList.remove('hidden');
        document.getElementById('preview-shop').innerText = `¥${res.shopProfit.toFixed(2)}`;
        document.getElementById('preview-su').innerText = `¥${res.suProfit.toFixed(2)}`;
        document.getElementById('preview-zhang').innerText = `¥${res.zhangTotal.toFixed(2)}`;
        
        document.getElementById('preview-shop').className = res.shopProfit >= 0 ? "text-sm font-bold text-emerald-600" : "text-sm font-bold text-rose-500";
        document.getElementById('preview-su').className = res.suProfit >= 0 ? "text-sm font-bold text-emerald-500" : "text-sm font-bold text-rose-500";
      } else {
        previewBox.classList.add('hidden');
      }
    }

    function saveCurrentBill() {
      const year = document.getElementById('select-year').value;
      const month = document.getElementById('select-month').value;
      const dateString = `${year}-${month}`;
      const res = calculateData();

      const existIdx = appDatabase.history.findIndex(h => h.month === dateString);
      const record = {
        id: existIdx !== -1 ? appDatabase.history[existIdx].id : "rec-" + dateString,
        month: dateString,
        monthStr: `${year}年${month}月`,
        shopProfit: parseFloat(res.shopProfit.toFixed(2)),
        suProfit: parseFloat(res.suProfit.toFixed(2)),
        zhangTotal: parseFloat(res.zhangTotal.toFixed(2)),
        isExpanded: true, 
        details: res.raw
      };

      if (existIdx !== -1) {
        appDatabase.history[existIdx] = record;
        triggerToast("历史数据已更新覆写");
      } else {
        appDatabase.history.unshift(record);
        triggerToast("新月份账单已入库保存");
      }

      appDatabase.history.sort((a, b) => b.month.localeCompare(a.month));
      localStorage.setItem(storageKey, JSON.stringify(appDatabase));

      setTimeout(() => { switchPage('history'); }, 700);
    }

    function renderHistory() {
      const container = document.getElementById('history-box');
      const emptyState = document.getElementById('history-empty');
      container.innerHTML = "";

      if (appDatabase.history.length === 0) {
        emptyState.classList.remove('hidden');
        return;
      } else {
        emptyState.classList.add('hidden');
      }

      appDatabase.history.forEach((h) => {
        const totalIncome = Object.values(h.details.income).reduce((a, b) => a + b, 0);
        const totalExpense = Object.values(h.details.expense).reduce((a, b) => a + b, 0);
        const invDelta = h.details.inventory.thisMonth - h.details.inventory.lastMonth;

        const cardMarkup = `
          <!-- 拟物化发票样式集装箱 -->
          <div id="capture-container-${h.id}" class="bg-white rounded-3xl ios-shadow border border-gray-100 overflow-hidden relative p-1">
            
            <!-- 仅在截图时可见的盖戳和页头 (html2canvas完美渲染) -->
            <div class="capture-only-header hidden px-6 pt-6 pb-2 text-center border-b-2 border-dashed border-gray-200">
              <h2 class="text-xl font-black text-gray-800 tracking-widest">门店月度经营清算发票</h2>
              <p class="text-[10px] text-gray-400 mt-1">清算时间: ${h.monthStr} | 最终决议公报</p>
            </div>

            <!-- 卡片头部点击条 -->
            <div onclick="toggleAccordion('${h.id}')" class="bg-[#2d3a4f] text-white p-4.5 flex justify-between items-center cursor-pointer active:opacity-90 transition rounded-t-2xl">
              <div class="flex items-center space-x-2.5">
                <i class="fa-solid fa-file-signature text-sm text-indigo-300"></i>
                <span class="font-bold text-sm tracking-wide">${h.monthStr}</span>
                <span class="bg-indigo-500/30 text-indigo-100 text-[10px] px-2.5 py-0.5 rounded-full font-bold">新公式版</span>
              </div>
              <div class="flex items-center space-x-2 data-no-capture">
                <i id="icon-chev-${h.id}" class="fa-solid fa-chevron-down text-xs transition-transform duration-300 ${h.isExpanded ? 'rotate-180' : ''}"></i>
              </div>
            </div>

            <!-- 利润汇总三大金刚 (极富质感的渐变微卡片设计) -->
            <div class="grid grid-cols-3 gap-3 px-4 py-5 bg-[#fafbfc] border-b border-gray-100/70 relative">
              
              <!-- 财务水印印章 (图片截图独享) -->
              <div class="capture-only-stamp hidden absolute right-6 top-2 w-16 h-16 rounded-full finance-stamp flex-col items-center justify-center font-bold text-[10px] tracking-widest z-10 select-none">
                <div>财务</div>
                <div class="border-t border-dashed border-red-500/20 my-0.5 w-10"></div>
                <div>已核准</div>
              </div>

              <div class="bg-white p-3 rounded-2xl border border-gray-100/50 shadow-xs">
                <div class="text-[10px] text-gray-400 font-bold mb-1">门店纯利润</div>
                <div class="text-sm font-black ${h.shopProfit >= 0 ? 'text-emerald-500' : 'text-rose-500'}">
                  ${h.shopProfit >= 0 ? '¥' : '-¥'}${Math.abs(h.shopProfit).toLocaleString('zh-CN', { minimumFractionDigits: 2 })}
                </div>
              </div>
              <div class="bg-white p-3 rounded-2xl border border-gray-100/50 shadow-xs">
                <div class="text-[10px] text-gray-400 font-bold mb-1">su分润 (80%)</div>
                <div class="text-sm font-black ${h.suProfit >= 0 ? 'text-emerald-500' : 'text-rose-500'}">
                  ${h.suProfit >= 0 ? '¥' : '-¥'}${Math.abs(h.suProfit).toLocaleString('zh-CN', { minimumFractionDigits: 2 })}
                </div>
              </div>
              <div class="bg-white p-3 rounded-2xl border border-gray-100/50 shadow-xs">
                <div class="text-[10px] text-gray-400 font-bold mb-1">张总收益</div>
                <div class="text-sm font-black text-indigo-600">
                  ¥${h.zhangTotal.toLocaleString('zh-CN', { minimumFractionDigits: 2 })}
                </div>
              </div>
            </div>

            <!-- 折叠详细拆分列表 -->
            <div id="expanded-${h.id}" class="${h.isExpanded ? '' : 'hidden'} p-4.5 bg-white space-y-4 text-xs transition-all duration-300">
              <div class="grid grid-cols-2 gap-4">
                <!-- 收入拆分 -->
                <div class="bg-emerald-50/30 p-3.5 rounded-2xl border border-emerald-100/60">
                  <div class="font-extrabold text-emerald-800 mb-3 flex items-center space-x-1">
                    <i class="fa-solid fa-square-plus text-emerald-500 text-sm"></i>
                    <span>收入明细</span>
                  </div>
                  <ul class="space-y-2 text-gray-600">
                    <li class="flex justify-between"><span>会生活:</span> <span class="font-bold text-gray-800">¥${h.details.income.huiseghuom.toFixed(2)}</span></li>
                    <li class="flex justify-between"><span>饿了么:</span> <span class="font-bold text-gray-800">¥${h.details.income.eleme.toFixed(2)}</span></li>
                    <li class="flex justify-between"><span>美团:</span> <span class="font-bold text-gray-800">¥${h.details.income.meituan.toFixed(2)}</span></li>
                    <li class="flex justify-between text-indigo-600 font-semibold"><span>抖音收入:</span> <span>¥${h.details.income.douyin.toFixed(2)}</span></li>
                    <li class="flex justify-between"><span>现金:</span> <span class="font-bold text-gray-800">¥${h.details.income.cash.toFixed(2)}</span></li>
                    <li class="flex justify-between border-t border-dashed border-emerald-200/80 pt-2 mt-2 font-black text-emerald-700">
                      <span>总收入:</span> <span>¥${totalIncome.toFixed(2)}</span>
                    </li>
                  </ul>
                </div>

                <!-- 支出拆分 (陈支出已经升级陈工资) -->
                <div class="bg-rose-50/30 p-3.5 rounded-2xl border border-rose-100/60">
                  <div class="font-extrabold text-rose-800 mb-3 flex items-center space-x-1">
                    <i class="fa-solid fa-square-minus text-rose-500 text-sm"></i>
                    <span>支出明细</span>
                  </div>
                  <ul class="space-y-2 text-gray-600">
                    <li class="flex justify-between"><span>货款杂费:</span> <span class="font-bold text-gray-800">¥${h.details.expense.goods.toFixed(2)}</span></li>
                    <li class="flex justify-between text-indigo-600 font-bold"><span>陈工资:</span> <span>¥${h.details.expense.chenSalary.toFixed(2)}</span></li>

                    <li class="flex justify-between"><span>张固定资:</span> <span class="font-bold text-gray-800">¥${h.details.expense.zhangSalary.toFixed(2)}</span></li>

                    <li class="flex justify-between"><span>张加班费:</span> <span class="font-bold text-gray-800">¥${h.details.expense.zhangOvertime.toFixed(2)}</span></li>
                    <li class="flex justify-between border-t border-dashed border-rose-200/80 pt-2 mt-2 font-black text-rose-700">
                      <span>总支出:</span> <span>¥${totalExpense.toFixed(2)}</span>
                    </li>
                  </ul>
                </div>
              </div>

              <!-- 库存和资产折耗 -->
              <div class="bg-blue-50/30 p-3.5 rounded-2xl border border-blue-100/50 flex justify-between items-center text-blue-900">
                <div class="flex items-center space-x-2">
                  <i class="fa-solid fa-warehouse text-blue-500"></i>
                  <span class="font-extrabold text-[11px]">本期库存清算:</span>
                </div>
                <div class="space-x-2.5 text-[11px] font-medium">
                  <span>期初: ¥${h.details.inventory.lastMonth}</span>
                  <span>期末: ¥${h.details.inventory.thisMonth}</span>
                  <span class="font-bold text-indigo-600">(${invDelta >= 0 ? '+' : ''}${invDelta.toFixed(2)})</span>
                </div>
              </div>

              <!-- 仅在截图长图展示的亲笔手签名区 -->
              <div class="capture-only-footer hidden pt-6 pb-2 border-t border-dashed border-gray-100 grid grid-cols-2 gap-4 text-center text-gray-400 text-[10px]">
                <div>
                  <p class="mb-4">合伙清算人 su 签字确认</p>
                  <p class="border-b border-gray-200 mx-auto w-24 h-5"></p>
                </div>
                <div>
                  <p class="mb-4">合伙清算人 张 签字确认</p>
                  <p class="border-b border-gray-200 mx-auto w-24 h-5"></p>
                </div>
              </div>

              <!-- 仅在App界面展示的控制操作按钮行 -->
              <div class="flex justify-between items-center pt-3 border-t border-gray-100 data-no-capture">
                <button onclick="exportToImage('${h.id}', '${h.monthStr}')" class="px-3.5 py-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 rounded-xl font-bold flex items-center space-x-1.5 transition-all">
                  <i class="fa-regular fa-image"></i>
                  <span>导出账单图片</span>
                </button>
                <div class="flex space-x-2">
                  <button onclick="editRecord('${h.month}')" class="px-4 py-2 border border-gray-200 text-gray-600 rounded-xl font-bold hover:bg-gray-50 flex items-center space-x-1.5 transition-all">
                    <i class="fa-solid fa-pen-to-square"></i>
                    <span>修改</span>
                  </button>
                  <button onclick="deleteRecord('${h.id}')" class="px-3 py-2 text-rose-400 hover:text-rose-600 rounded-xl flex items-center transition-all">
                    <i class="fa-regular fa-trash-can text-sm"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
        container.innerHTML += cardMarkup;
      });
    }

    // 网页截图引擎，支持专属的防伪、清算页头页脚高仿实体化效果
    function exportToImage(elementId, monthTitle) {
      triggerToast("生成实体账单中，请稍候...");
      
      const targetElement = document.getElementById(`capture-container-${elementId}`);
      
      // 临时开启截图元素
      const capHeader = targetElement.querySelector('.capture-only-header');
      const capStamp = targetElement.querySelector('.capture-only-stamp');
      const capFooter = targetElement.querySelector('.capture-only-footer');
      const noCapRow = targetElement.querySelector('.data-no-capture');

      if (capHeader) capHeader.classList.remove('hidden');
      if (capStamp) capStamp.classList.remove('hidden');
      if (capStamp) capStamp.classList.add('flex');
      if (capFooter) capFooter.classList.remove('hidden');
      if (noCapRow) noCapRow.style.display = 'none';

      // 临时去除卡片外侧大圆角，确保导出的截图长方形更适合打印和排版
      targetElement.style.borderRadius = "0px";

      html2canvas(targetElement, {
        scale: 2, // 保持清晰度
        useCORS: true,
        backgroundColor: "#ffffff"
      }).then(canvas => {
        // 恢复原始界面样式
        if (capHeader) capHeader.classList.add('hidden');
        if (capStamp) capStamp.classList.add('hidden');
        if (capStamp) capStamp.classList.remove('flex');
        if (capFooter) capFooter.classList.add('hidden');
        if (noCapRow) noCapRow.style.display = 'flex';
        targetElement.style.borderRadius = "1.5rem"; // 24px = 1.5rem

        const imgData = canvas.toDataURL('image/jpeg', 0.95);
        const downloadLink = document.createElement('a');
        downloadLink.href = imgData;
        downloadLink.download = `${monthTitle}_财务利益分配清算单.jpg`;
        
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
        
        triggerDialog("生成成功", "已成功导出带有【水印公章、锯齿分界线、双方清算人确认字栏】的高清清算账单图！若在微信内打开请长按图片保存。", false);
      }).catch(err => {
        if (capHeader) capHeader.classList.add('hidden');
        if (capStamp) capStamp.classList.add('hidden');
        if (capFooter) capFooter.classList.add('hidden');
        if (noCapRow) noCapRow.style.display = 'flex';
        targetElement.style.borderRadius = "1.5rem";
        triggerToast("生成失败，请重试");
        console.error(err);
      });
    }

    function toggleAccordion(id) {
      const idx = appDatabase.history.findIndex(h => h.id === id);
      if (idx !== -1) {
        appDatabase.history[idx].isExpanded = !appDatabase.history[idx].isExpanded;
        const box = document.getElementById(`expanded-${id}`);
        const chev = document.getElementById(`icon-chev-${id}`);
        if (appDatabase.history[idx].isExpanded) {
          box.classList.remove('hidden');
          chev.classList.add('rotate-180');
        } else {
          box.classList.add('hidden');
          chev.classList.remove('rotate-180');
        }
        localStorage.setItem(storageKey, JSON.stringify(appDatabase));
      }
    }

    function editRecord(month) {
      switchPage('input');
      onMonthChange(month);
      triggerToast("历史数据已重载到编辑区");
    }

    function deleteRecord(id) {
      triggerDialog("删除确认", "您确认要从本地彻底删除该月的账单存档吗？", true, () => {
        appDatabase.history = appDatabase.history.filter(h => h.id !== id);
        localStorage.setItem(storageKey, JSON.stringify(appDatabase));
        renderHistory();
        triggerToast("记录已删除");
      });
    }

    function askClearAll() {
      triggerDialog("警告", "您确定要清空手机上的全部历史经营账单数据吗？该操作不可挽回！", true, () => {
        appDatabase.history = [];
        localStorage.setItem(storageKey, JSON.stringify(appDatabase));
        renderHistory();
        triggerToast("数据库已全清空");
      });
    }
  </script>
</body>
</html>
